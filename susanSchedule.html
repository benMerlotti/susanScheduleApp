<style>

<script>
// Your Firebase config (from Firebase Console > Project settings)
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC6n4vN4RFcGU0YOf0iO_VI3UzVbI0j7F4",
  authDomain: "susan-scheduler-b763b.firebaseapp.com",
  projectId: "susan-scheduler-b763b",
  storageBucket: "susan-scheduler-b763b.firebasestorage.app",
  messagingSenderId: "458232685657",
  appId: "1:458232685657:web:2e451e51f79b7c21967d48",
  measurementId: "G-97C90L6PQ1"
};
let firebaseApp, firebaseAuth, firebaseDb, firebaseUser = null;

function initFirebase(){
  try {
    firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
    firebaseAuth = firebase.auth();
    firebaseDb = firebase.firestore();
    if (firebaseDb.enableIndexedDbPersistence) {
      firebaseDb.enableIndexedDbPersistence({ synchronizeTabs: true }).catch(function(err) { if (err.code !== "failed-precondition") console.warn("Firebase persistence:", err); });
    }
  } catch (e) { console.warn("Firebase init failed (use your config):", e); }
}

function showAuthScreen(){
  document.getElementById("auth-screen").classList.add("visible");
  document.getElementById("app-content").classList.remove("visible");
}
function hideAuthScreen(){
  document.getElementById("auth-screen").classList.remove("visible");
  document.getElementById("app-content").classList.add("visible");
}
function setAuthError(msg){ document.getElementById("auth-error").textContent = msg || ""; }

function firestoreTimestampToDate(val){
  if (!val) return val;
  if (typeof val.toDate === "function") return val.toDate();
  if (val.seconds != null) return new Date(val.seconds * 1000);
  return val instanceof Date ? val : new Date(val);
}

function loadStateFromFirebase(){
  return firebaseDb.collection("users").doc(firebaseUser.uid).get().then(function(snap){
    if (snap.exists && snap.data().scheduleData) {
      const d = snap.data().scheduleData;
      if (d.currentWeekKey != null) S.currentWeekKey = d.currentWeekKey;
      if (d.weekDays != null) {
        S.weekDays = d.weekDays.map(function(w){
          return Object.assign({}, w, { dateObj: firestoreTimestampToDate(w.dateObj) });
        });
      }
      if (d.tasks != null) S.tasks = d.tasks;
      if (d.checked != null) S.checked = d.checked;
      if (d.archive != null) S.archive = d.archive;
    } else {
      // First time signing in: copy current localStorage data into Firestore
      loadState();
      saveToFirebase();
    }
  }).catch(function(err){ console.warn("Firebase load failed:", err); });
}

function setCloudStatus(msg, isError){
  var el = document.getElementById("cloud-status");
  if (!el) return;
  el.textContent = msg || "";
  el.className = isError ? "error" : (msg ? "saved" : "");
  if (msg) setTimeout(function(){ el.textContent = ""; el.className = ""; }, 4000);
}

function saveToFirebase(){
  if (!firebaseUser || !firebaseDb) return;
  firebaseDb.collection("users").doc(firebaseUser.uid).set({
    scheduleData: S,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true })
    .then(function(){ setCloudStatus("Saved"); })
    .catch(function(err){ setCloudStatus("Save failed: " + (err.message || err.code || "unknown"), true); console.warn("Firebase save failed:", err); });
}

function runAppInit(){
  if(!firebaseUser) loadState();
  const needsRollover = initOrAdvanceWeek();
  activeDay = getTodayKey();
  tabOffset = getTabOffsetForActiveDay();
  render();
  showRolloverIfNeeded(needsRollover);
}

function startAuthListeners(){
  if (!firebaseAuth) return;
  firebaseAuth.onAuthStateChanged(function(user){
    firebaseUser = user;
    if (user) {
      loadStateFromFirebase().then(function(){ runAppInit(); });
      hideAuthScreen();
    } else {
      showAuthScreen();
    }
  });
}

document.getElementById("auth-signin").onclick = function(){
  setAuthError("");

function getOverdueTasks(){
  const today=new Date();today.setHours(0,0,0,0);
  return S.tasks.filter(t=>{
    if(S.checked[t.id])return false;
    const def=S.weekDays.find(d=>d.key===t.dayKey);
    if(!def)return true;
    const dd=new Date(def.dateObj);dd.setHours(0,0,0,0);
    return dd<today;
  });
}

function buildRolloverDays(){
  // Build a list of days to offer in the rollover dropdown.
  // Always includes today + all future days this week.
  // If fewer than 4 days remain this week, also adds next week's days
  // so there are always plenty of options.
  const today=new Date();today.setHours(0,0,0,0);
  const thisWeekFuture=S.weekDays.filter(d=>{
    const dd=new Date(d.dateObj);dd.setHours(0,0,0,0);return dd>=today;
  });
  // Always build next week too and append it
  const nextMon=getMonday(new Date(today.getTime()+7*24*60*60*1000));
  const nextWeekDays=buildWeekDays(nextMon);
  // Combine: this week's remaining days + all of next week
  // De-dupe by key just in case
  const seen=new Set();
  const combined=[...thisWeekFuture,...nextWeekDays].filter(d=>{
    if(seen.has(d.key))return false;seen.add(d.key);return true;
  });
  return combined;
}

function getTodayKey(){

  const days=getAllTabDays();

  const exact=days.find(d=>{const dd=new Date(d.dateObj);dd.setHours(0,0,0,0);return dd.getTime()===today.getTime();});
  if(exact)return exact.key;
  return days[0]?.key;
}
function isToday(def){const d=new Date(def.dateObj);d.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return d.getTime()===t.getTime();}
function isPast(def){const d=new Date(def.dateObj);d.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return d<t;}

// How many tabs visible at once
const TABS_VISIBLE = 4;
let tabOffset = 0;

function dayEntryForDate(d){
  d.setHours(0,0,0,0);
  const dow=DOW_LABELS[d.getDay()];
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");
  return {key:dow+"_"+y+"-"+m+"-"+day,dow,label:DAY_DISPLAY[dow],
    date:d.toLocaleString("default",{month:"short"})+" "+d.getDate(),
    dateObj:new Date(d),hasWorkout:HAS_WORKOUT[dow],note:DAY_NOTES[dow]};
}
function getTodayDayEntry(){
  return dayEntryForDate(new Date());
}
function getSyntheticDaysBetween(todayMidnight, firstFutureDate){
  const out=[];const cursor=new Date(todayMidnight);
  const first=new Date(firstFutureDate);first.setHours(0,0,0,0);
  while(cursor.getTime()<first.getTime()){
    out.push(dayEntryForDate(new Date(cursor)));
    cursor.setDate(cursor.getDate()+1);
  }
  return out;
}
function getAllTabDays(){
  // Build the full navigable list:
  // previous week → past days this week → today → future days this week → all of next week
  const today=new Date();today.setHours(0,0,0,0);
  const lastWeekMon=getMonday(new Date(today.getTime()-7*24*60*60*1000));
  const lastWeekDays=buildWeekDays(lastWeekMon);
  const past=S.weekDays.filter(d=>{const dd=new Date(d.dateObj);dd.setHours(0,0,0,0);return dd<today;});
  const todayAndFuture=S.weekDays.filter(d=>{const dd=new Date(d.dateObj);dd.setHours(0,0,0,0);return dd>=today;});
  const hasActualToday=[...past,...todayAndFuture].some(d=>{const dd=new Date(d.dateObj);dd.setHours(0,0,0,0);return dd.getTime()===today.getTime();});
  let synthetic=[];
  if(!hasActualToday){
    const firstFuture=todayAndFuture[0];
    if(firstFuture){
      const firstDate=new Date(firstFuture.dateObj);firstDate.setHours(0,0,0,0);
      synthetic=getSyntheticDaysBetween(new Date(today),firstDate);
    }else synthetic=[getTodayDayEntry()];
  }
  const nextMon=getMonday(new Date(today.getTime()+7*24*60*60*1000));
  const nextWeek=buildWeekDays(nextMon);
  const seen=new Set(S.weekDays.map(d=>d.key));
  synthetic.forEach(s=>seen.add(s.key));
  const nextWeekNew=nextWeek.filter(d=>!seen.has(d.key));
  const thisWeekPart=synthetic.length?[...past,...synthetic,...todayAndFuture,...nextWeekNew]:[...past,...todayAndFuture,...nextWeekNew];
  const seenThisWeek=new Set(thisWeekPart.map(d=>d.key));
  const lastWeekNew=lastWeekDays.filter(d=>!seenThisWeek.has(d.key));
  return [...lastWeekNew,...thisWeekPart];
}

function getTodayTabOffset(){
  const days=getAllTabDays();
  const today=new Date();today.setHours(0,0,0,0);
  const idx=days.findIndex(d=>{const dd=new Date(d.dateObj);dd.setHours(0,0,0,0);return dd.getTime()===today.getTime();});
  return Math.max(0,idx);
}

function shiftTabs(dir){
  const days=getAllTabDays();
  const maxOffset=Math.max(0,days.length-TABS_VISIBLE);
  tabOffset=Math.max(0,Math.min(tabOffset+dir,maxOffset));
  // Clicking an arrow moves to the first visible tab in that direction
  if(days[tabOffset]){activeDay=days[tabOffset].key;editingId=null;}
  render();
}

function renderTabs(){
  const el=document.getElementById("tabs");el.innerHTML="";
  const days=getAllTabDays();
  const maxOffset=Math.max(0,days.length-TABS_VISIBLE);
  tabOffset=Math.max(0,Math.min(tabOffset,maxOffset));
  const visible=days.slice(tabOffset,tabOffset+TABS_VISIBLE);
  visible.forEach(d=>{
    const dt=S.tasks.filter(t=>t.dayKey===d.key),dc=dt.filter(t=>S.checked[t.id]).length;
    const isT=isToday(d),isP=isPast(d);
    const btn=document.createElement("button");
    btn.className="tab"+(d.key===activeDay?" active":"")+(isT?" today-tab":isP?" past-tab":"");
    btn.style.flex="1";
    btn.innerHTML=`<div class="tab-day">${d.label.slice(0,3).toUpperCase()}${isT?" ★":""}</div>
      <div class="tab-date">${d.date}</div>
      <div class="tab-count ${dc===dt.length&&dt.length>0?"all-done":""}"> ${dc}/${dt.length}</div>`;
    btn.onclick=()=>{activeDay=d.key;editingId=null;render();};
    el.appendChild(btn);
  });
  const prev=document.getElementById("tab-prev");
  const next=document.getElementById("tab-next");
  if(prev)prev.disabled=tabOffset<=0;
  if(next)next.disabled=tabOffset>=maxOffset;
}


function getWeekKeyForDay(dayKey){
  const dateStr=dayKey.split("_")[1];
  if(!dateStr)return null;

function renderDay(){
  const day=getAllTabDays().find(d=>d.key===activeDay);if(!day)return;
  const isT=isToday(day),isP=isPast(day);
  // Past days: show completed tasks from S.tasks for this day, or (if none) archive for that week
  let dayTasks=isP
    ? S.tasks.filter(t=>t.dayKey===activeDay&&S.checked[t.id])
    : S.tasks.filter(t=>t.dayKey===activeDay);
  let archiveForWeek=null;
  if(isP&&dayTasks.length===0){
    const wk=getWeekKeyForDay(activeDay);
    if(wk)archiveForWeek=S.archive.find(a=>a.weekKey===wk);
    if(archiveForWeek&&archiveForWeek.tasks&&archiveForWeek.tasks.length>0){
      dayTasks=archiveForWeek.tasks.map((t,i)=>({id:"ar_"+i,text:t.text,tag:t.tag,dayKey:activeDay}));
    }
  }
  const nextDef=S.weekDays[S.weekDays.findIndex(d=>d.key===activeDay)+1]||null;
  const groups={};TAG_ORDER.forEach(t=>groups[t]=[]);
  dayTasks.forEach(t=>{if(!groups[t.tag])groups[t.tag]=[];groups[t.tag].push(t);});
  const dayDone=dayTasks.filter(t=>S.checked[t.id]||(t.id&&String(t.id).startsWith("ar_"))).length;
  const dayTotal=dayTasks.length;
  const dayPct=dayTotal?Math.round(dayDone/dayTotal*100):0;
  let html=`<div class="day-header">
    <div class="day-title">${day.label} <span style="color:#aaa;font-size:16px;font-weight:400">- ${day.date}</span>
      ${isT?'<span class="today-badge">Today</span>':isP?'<span class="past-badge">past</span>':""}
    </div><div class="day-note">${day.note}</div>
    ${dayTotal?`<div class="day-pct">${dayDone}/${dayTotal} done (${dayPct}%)</div><div class="day-pct-bar-wrap"><div class="day-pct-bar" style="width:${dayPct}%"></div></div>`:""}
    ${archiveForWeek?'<div class="day-note" style="margin-top:6px;color:#888;">Completed that week (for reference)</div>':""}</div>`;
  if(!isP)html+=`<div class="add-bar">
    <input id="new-text" placeholder="Add a task for ${day.label}..." onkeydown="if(event.key==='Enter')addTask()" />
    <select id="new-tag">${TAGS.map(t=>`<option>${t}</option>`).join("")}</select>
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>`;
  html+=`<div class="blocks">`;
  if(day.hasWorkout)html+=`<div class="workout-block"><span style="font-size:20px">&#127939;</span>
    <div><div class="wo-text">Workout &amp; walk - protected time</div><div class="wo-time">9:00 - 11:00am</div></div></div>`;
  let hasAny=false;
  TAG_ORDER.forEach(tag=>{
    const grp=groups[tag]||[];if(!grp.length)return;hasAny=true;
    const meta=TAG_META[tag],dc=grp.filter(t=>S.checked[t.id]||(t.id&&String(t.id).startsWith("ar_"))).length;
    html+=`<div class="tag-block ${dc===grp.length?"all-done":""}">
      <div class="tag-block-header" style="background:${meta.color}">
        <div class="tag-block-title">${meta.icon} ${tag}</div>
        <div class="tag-block-count">${dc}/${grp.length}</div></div>`;
    grp.forEach((task,ti)=>{
      const done=!!S.checked[task.id]||(task.id&&String(task.id).startsWith("ar_")),isE=!isP&&editingId===task.id,border=ti<grp.length-1?"1px solid #F5F2EE":"none";
      if(isE){
        html+=`<div class="task-row" style="border-bottom:${border}">
          <input class="edit-input" id="ei_${task.id}" value="${task.text.replace(/"/g,"&quot;")}"
            onkeydown="if(event.key==='Enter')saveEdit('${task.id}');if(event.key==='Escape')cancelEdit()" />
          <div class="row-actions">
            <select id="et_${task.id}" class="ib" style="padding:3px 6px">${TAGS.map(t=>`<option${t===task.tag?" selected":""}>${t}</option>`).join("")}</select>
            <button class="ib save-btn" onclick="saveEdit('${task.id}')">Save</button>
            <button class="ib" onclick="cancelEdit()">Cancel</button></div></div>`;
      }else{
        const readOnly=isP;
        const dragAttrs=readOnly?"":`draggable="true" ondragstart="taskDragStart(event,'${task.id}')" ondragend="taskDragEnd(event)" ondragover="taskDragOver(event,'${task.id}')" ondragleave="taskDragLeave(event)" ondrop="taskDrop(event,'${task.id}')"`;
        const handle=readOnly?"":`<span class="task-drag-handle" title="Drag to reorder" onclick="event.stopPropagation()">&#9776;</span>`;
        html+=`<div class="task-row ${done?"done-row":""}" style="border-bottom:${border}" data-task-id="${task.id}" ${dragAttrs}>
          ${handle}
          <div class="cb ${done?"on":""}" style="--bc:${meta.color}" ${readOnly?"":`onclick="toggleTask('${task.id}')"`}><span class="ck">&#10003;</span></div>
          <span class="task-text ${done?"done-text":""}">${task.text}</span>
          ${readOnly?"":`<div class="row-actions">
            <button class="ib" onclick="startEdit('${task.id}')">&#9999;&#65039;</button>
            ${nextDef?`<button class="ib" onclick="pushToNext('${task.id}','${nextDef.key}')">-&gt;${nextDef.label.slice(0,3)}</button>`:""}
            <button class="ib" onclick="openModal('${task.id}')">&#128197;</button>
            <button class="ib del" onclick="deleteTask('${task.id}')">&#x2715;</button>
          </div>`}</div>`;
      }
    });
    html+=`</div>`;
  });
  if(!hasAny)html+=`<div class="empty-day">${isP?"No completed tasks for this day.":"No tasks for "+day.label+" - add one above!"}</div>`;
  html+=`</div>`;
  document.getElementById("content").innerHTML=html;
  if(editingId){const inp=document.getElementById("ei_"+editingId);if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}}
}

function toggleTask(id){S.checked[id]=!S.checked[id];saveState();render();}
function addTask(){
  const inp=document.getElementById("new-text"),sel=document.getElementById("new-tag");
  if(!inp?.value.trim())return;
  S.tasks.push({id:"c"+Date.now(),dayKey:activeDay,text:inp.value.trim(),tag:sel.value});
  inp.value="";saveState();render();
}
function startEdit(id){editingId=id;renderDay();}
function cancelEdit(){editingId=null;renderDay();}
function saveEdit(id){
  const inp=document.getElementById("ei_"+id),sel=document.getElementById("et_"+id);
  if(!inp?.value.trim())return;
  const t=S.tasks.find(t=>t.id===id);
  if(t){t.text=inp.value.trim();t.tag=sel.value;}
  editingId=null;saveState();render();
}
function pushToNext(id,toKey){const t=S.tasks.find(t=>t.id===id);if(t)t.dayKey=toKey;saveState();render();}
function openModal(id){
  const t=S.tasks.find(t=>t.id===id);if(!t)return;
  moveCtx=id;document.getElementById("modal-task-text").textContent=t.text;
  const opts=document.getElementById("modal-day-opts");opts.innerHTML="";
  const today=new Date();today.setHours(0,0,0,0);
  getAllTabDays().filter(d=>{
    if(d.key===activeDay)return false;
    const dd=new Date(d.dateObj);dd.setHours(0,0,0,0);
    return dd>=today;
  }).forEach(d=>{
    const btn=document.createElement("button");btn.className="day-opt";
    btn.textContent=d.label+" - "+d.date;btn.onclick=()=>moveToDay(d.key);opts.appendChild(btn);
  });
  document.getElementById("modal-overlay").classList.add("open");
}
function moveToDay(toKey){const t=S.tasks.find(t=>t.id===moveCtx);if(t)t.dayKey=toKey;closeModal();saveState();render();}
function closeModal(){moveCtx=null;document.getElementById("modal-overlay").classList.remove("open");}
function deleteTask(id){if(!confirm("Delete this task?"))return;S.tasks=S.tasks.filter(t=>t.id!==id);delete S.checked[id];saveState();render();}

function getDayTasksInOrder(){
  return S.tasks.filter(t=>t.dayKey===activeDay);
}
function reorderDayTasks(draggedId,targetId){
  const dayTasks=getDayTasksInOrder();
  if(dayTasks.length<2)return;
  const idx=dayTasks.findIndex(t=>t.id===draggedId);
  const targetIdx=dayTasks.findIndex(t=>t.id===targetId);
  if(idx===-1||targetIdx===-1||idx===targetIdx)return;
  const reordered=dayTasks.filter(t=>t.id!==draggedId);
  const insertAt=reordered.findIndex(t=>t.id===targetId);
  reordered.splice(insertAt,0,dayTasks[idx]);
  const other=S.tasks.filter(t=>t.dayKey!==activeDay);
  S.tasks=[...other,...reordered];
  saveState();render();
}
function taskDragStart(ev,id){
  ev.dataTransfer.setData("text/plain",id);
  ev.dataTransfer.effectAllowed="move";
  ev.target.closest(".task-row").classList.add("dragging");
}
function taskDragEnd(ev){ev.target.closest(".task-row")?.classList.remove("dragging");document.querySelectorAll(".task-row.drag-over").forEach(r=>r.classList.remove("drag-over"));}
function taskDragOver(ev,id){
  ev.preventDefault();
  ev.dataTransfer.dropEffect="move";
  const row=ev.target.closest(".task-row");
  if(row&&!row.classList.contains("dragging"))row.classList.add("drag-over");
}
function taskDragLeave(ev){const row=ev.target.closest(".task-row");if(row)row.classList.remove("drag-over");}
function taskDrop(ev,targetId){
  ev.preventDefault();
  ev.target.closest(".task-row")?.classList.remove("drag-over");
  const draggedId=ev.dataTransfer.getData("text/plain");
  if(draggedId&&draggedId!==targetId)reorderDayTasks(draggedId,targetId);
}

document.getElementById("modal-overlay").addEventListener("click",e=>{if(e.target.id==="modal-overlay")closeModal();});

function goToToday(){
  activeDay=getTodayKey();
  tabOffset=getTodayTabOffset();
  editingId=null;
  render();
}

initFirebase();
if(firebaseApp&&FIREBASE_CONFIG.apiKey&&!FIREBASE_CONFIG.apiKey.includes("YOUR_")){
  startAuthListeners();
}else{
  document.getElementById("auth-screen").classList.remove("visible");
  document.getElementById("app-content").classList.add("visible");
  runAppInit();
}
</script>
</body>
</html>
